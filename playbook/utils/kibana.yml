---
- name: Configure Kibana
  hosts: kibana
  gather_facts: yes
  vars:
    es_cert_pass: "elastic2024"  # Make sure this matches what was used in cluster setup
  tasks:
    - name: Install and Configure Kibana
      block:
        - name: Install Kibana
          apt:
            name: kibana=8.15.3
            state: present
            allow_unauthenticated: no
            update_cache: yes
          environment:
            DEBIAN_FRONTEND: noninteractive

        - name: Create Kibana certificates directory
          file:
            path: /etc/kibana/certs
            state: directory
            owner: kibana
            group: kibana
            mode: '0750'

        - name: Copy certificate to Kibana
          copy:
            src: "/tmp/elastic-certs/elastic-certificates.p12"
            dest: "/etc/kibana/certs/elastic-certificates.p12"
            owner: kibana
            group: kibana
            mode: '0640'

        - name: Set certificate permissions
          file:
            path: "/etc/kibana/certs/elastic-certificates.p12"
            owner: kibana
            group: kibana
            mode: '0640'

        - name: Configure Kibana
          copy:
            dest: /etc/kibana/kibana.yml
            content: |
              # Server settings
              server.host: "{{ ansible_host }}"
              server.port: 5601

              # SSL/TLS Configuration for Kibana
              server.ssl.enabled: true
              server.ssl.certificate: "/etc/kibana/certs/elastic-certificates.p12"
              server.ssl.keystore:
                path: "/etc/kibana/certs/elastic-certificates.p12"
                password: "{{ es_cert_pass }}"

              # Elasticsearch connection
              elasticsearch.hosts: 
                {% for host in groups['hot_nodes'] %}
                - "https://{{ hostvars[host]['ansible_host'] }}:9200"
                {% endfor %}
              elasticsearch.username: "kibana_system"
              
              # SSL Settings for Elasticsearch connection
              elasticsearch.ssl.verificationMode: certificate
              elasticsearch.ssl.certificateAuthorities: ["/etc/kibana/certs/elastic-certificates.p12"]
              elasticsearch.ssl.keystore:
                path: "/etc/kibana/certs/elastic-certificates.p12"
                password: "{{ es_cert_pass }}"

              # Logging
              logging.root.level: debug
            owner: kibana
            group: kibana
            mode: '0660'

        - name: Reset kibana_system user password
          shell: |
            /usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system -b -f
          register: kibana_password
          retries: 3
          delay: 10
          until: kibana_password.rc == 0
          delegate_to: "{{ groups['master_nodes'][0] }}"

        - name: Set Kibana keystore password
          shell: |
            echo "{{ kibana_password.stdout.split('New value: ')[1] | trim }}" | /usr/share/kibana/bin/kibana-keystore add --stdin elasticsearch.password

        - name: Enable and start Kibana service
          systemd:
            name: kibana
            enabled: yes
            state: started
            daemon_reload: yes

        - name: Wait for Kibana to start
          wait_for:
            port: 5601
            host: "{{ ansible_host }}"
            scheme: https
            timeout: 180

        - name: Save Kibana password
          copy:
            content: "{{ kibana_password.stdout }}"
            dest: "/home/ubuntu/.elasticsearch/kibana_password.txt"
            mode: '0600'
          delegate_to: localhost
      become: yes